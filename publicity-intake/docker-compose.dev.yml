# Dev/validation stack — pulls the :dev image CI builds from non-main branches
# and loads config from .env.dev (NOT .env). Use this to validate a branch build
# before merging to main.
#
#   cp .env.dev.example .env.dev   # fill in your webhook URL (+ optional auth)
#   docker compose -f docker-compose.dev.yml up
#
# pull_policy: always grabs the freshest :dev each run, so re-running picks up a
# new push once its build finishes.
services:
  publicity-intake:
    image: ghcr.io/gpsaswimming/publicity-intake:dev
    pull_policy: always
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.dev
    environment:
      # Fixed runtime settings (override anything in .env.dev).
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
