# Local build stack — builds the image from the working tree (NOT a GHCR pull),
# so you can validate uncommitted changes before pushing. Use docker-compose.dev.yml
# instead when you want to validate the CI-built :dev image off a pushed branch.
# Loads config from .env.dev, same as the dev stack.
#
#   cp .env.dev.example .env.dev   # fill in your webhook URL (+ optional auth)
#   docker compose -f docker-compose.local.yml up --build -d
#   # open http://localhost:8080
#   docker compose -f docker-compose.local.yml down
#
# The Dockerfile copies repo-root-relative paths (COPY publicity-intake/...), so
# the build context is the repo root (..) with the Dockerfile pointed at directly.
# N8N_WEBHOOK_URL is only needed to exercise an actual submit; the file-selection
# UX renders fine without it (a submit would just return 503).
services:
  publicity-intake:
    build:
      context: ..
      dockerfile: publicity-intake/Dockerfile
    image: publicity-intake:local
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.dev
    environment:
      # Fixed runtime settings (override anything in .env.dev).
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
