<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GPSA Relay Builder{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Favicon Links -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://assets.gpsaswimming.org/img/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://assets.gpsaswimming.org/img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://assets.gpsaswimming.org/img/favicons/favicon-16x16.png">
    <link rel="mask-icon" href="https://assets.gpsaswimming.org/img/favicons/safari-pinned-tab.svg" color="#002366">
    <meta name="msapplication-TileColor" content="#002366">
    <meta name="theme-color" content="#002366">
    <!-- GPSA Common Styles -->
    <link rel="stylesheet" href="https://css.gpsaswimming.org/gpsa-tools-common.css">
</head>
<body>
    <main class="container mx-auto p-4 sm:p-6 lg:p-8">
        <div class="max-w-5xl mx-auto">
            <header class="gpsa-header p-4 shadow-md flex items-center justify-center mb-6 rounded-lg print:hidden">
                <img src="https://assets.gpsaswimming.org/img/gpsa_logo.png" alt="GPSA Logo" class="h-16 w-16 md:h-20 md:w-20 mr-4 rounded-full" onerror="this.onerror=null; this.src='https://placehold.co/100x100/002366/FFFFFF?text=GPSA';">
                <div>
                    <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold">{{ MEET_TITLE }}</h1>
                </div>
            </header>

            <nav class="flex gap-5 mb-6 text-sm font-semibold print:hidden">
                <a href="/" class="text-[#002366] hover:underline">Swimmer Pool</a>
                <a href="/scenarios" class="text-[#002366] hover:underline">Scenarios</a>
            </nav>

            {% block content %}{% endblock %}

            <p class="text-center text-xs text-gray-400 mt-8 print:hidden">Greater Peninsula Swimming Association &middot; Internal relay tool</p>
        </div>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
