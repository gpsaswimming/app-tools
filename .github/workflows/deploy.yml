name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Stage only the public static site. The Docker services (publicity-server,
      # publicity-intake) and repo metadata are intentionally NOT published to
      # tools.gpsaswimming.org — deploying an explicit allowlist keeps any future
      # server/tool directory off the public site by default.
      - name: Stage static site
        run: |
          mkdir -p dist
          cp index.html publicity.html roster.html entry-summary.html entry-fees-report.html dist/
          cp meet-marshal-test.html dist/     # unlinked prototype for stakeholder review
          cp -r lib dist/
          rm -f dist/lib/*.test.js          # tests aren't part of the public site
          # entry-summary.html imports @gpsa/swimparse in the browser; stage the
          # zero-dependency source only (never the .sd3/.hy3 test fixtures).
          mkdir -p dist/swimparse
          cp -r swimparse/src dist/swimparse/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=gpsa-tools --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
